name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      # Advisory in PR CI: a new transitive advisory should not block unrelated changes.
      # A future task can promote this to a hard nightly job.
      - name: Audit dependencies (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit
        continue-on-error: true

      - name: Run pytest
        run: pytest -q

  disclosure:
    # Blocking gate: the public tree is engineering-only. Fails the build if
    # internal / non-engineering content (validation taxonomy, prosecution or
    # claim-element framing, internal paths/names) reaches a tracked file.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Disclosure scrub gate
        run: bash scripts/check_disclosure.sh
